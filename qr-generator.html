<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator | Sunroad Auto</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f0f0;
      font-family: -apple-system, 'Inter', Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page-header {
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 16px;
      gap: 8px;
    }

    .logo {
      max-height: 48px;
      max-width: 220px;
      display: block;
    }

    .page-title {
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #aaa;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px 48px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
      padding: 28px 28px 24px;
    }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 6px;
    }

    .url-input {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 7px;
      padding: 11px 14px;
      font-size: 14px;
      color: #222;
      background: #fafafa;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }
    .url-input:focus { border-color: #555; background: #fff; }
    .url-input.error { border-color: #e53e3e; }
    .url-input::placeholder { color: #bbb; }

    .error-msg {
      display: none;
      font-size: 11px;
      color: #e53e3e;
      margin-top: 5px;
    }
    .error-msg.visible { display: block; }

    .qr-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 24px 0 20px;
      gap: 10px;
    }

    .qr-box {
      width: 160px;
      height: 160px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      background: #f8f8f8;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .qr-box svg { display: block; }

    .qr-placeholder {
      font-size: 12px;
      color: #bbb;
      text-align: center;
      padding: 0 16px;
      line-height: 1.6;
    }

    .qr-meta {
      font-size: 11px;
      color: #aaa;
      letter-spacing: .04em;
    }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 0 0 20px;
    }

    .export-row { display: flex; gap: 10px; }

    .btn {
      flex: 1;
      padding: 11px 0;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: opacity .15s, background .15s;
      font-family: inherit;
    }
    .btn:disabled { opacity: .35; cursor: not-allowed; }
    .btn-png { background: #1a1a1a; color: #fff; }
    .btn-png:not(:disabled):hover { background: #333; }
    .btn-svg { background: #f0f0f0; color: #333; border: 1.5px solid #ddd; }
    .btn-svg:not(:disabled):hover { background: #e6e6e6; }

    .btn-label { line-height: 1; text-align: left; }
    .btn-sub {
      display: block;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #888;
      margin-top: 2px;
    }
    .btn-png .btn-sub { color: #aaa; }
    .btn-icon { font-size: 14px; }

    .card-footer {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: #bbb;
    }

    .lib-error {
      color: #e53e3e;
      text-align: center;
      padding: 20px;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
  <script src="https://unpkg.com/qr-code-styling@1.6.0-rc1/lib/qr-code-styling.js"></script>
</head>
<body>

  <div class="page-header">
    <img
      src="https://www.sunroadauto.com/wp-content/themes/DealerInspireDealerTheme/images/logo.png"
      alt="Sunroad Auto"
      class="logo"
      onerror="this.style.display='none'"
    >
    <div class="page-title">QR Code Generator</div>
  </div>

  <main class="main">
    <div class="card">
      <label class="field-label" for="url-input">Vehicle URL</label>
      <input
        type="url"
        id="url-input"
        class="url-input"
        placeholder="https://sunroadauto.com/inventory/…"
        autocomplete="off"
        spellcheck="false"
      >
      <div class="error-msg" id="error-msg" aria-live="polite">Please enter a valid URL</div>

      <div class="qr-area">
        <div class="qr-box">
          <div class="qr-placeholder" id="qr-placeholder">Enter a URL<br>to generate a QR code</div>
          <div id="qr-preview" style="display:none"></div>
        </div>
        <div class="qr-meta">3&Prime; &times; 3&Prime; &nbsp;&middot;&nbsp; Print-ready &nbsp;&middot;&nbsp; Error correction: High</div>
      </div>

      <hr class="divider">

      <div class="export-row">
        <button class="btn btn-png" id="btn-png" disabled>
          <span class="btn-icon">&#8595;</span>
          <span class="btn-label">Export PNG<span class="btn-sub">900 &times; 900 px</span></span>
        </button>
        <button class="btn btn-svg" id="btn-svg" disabled>
          <span class="btn-icon">&#8595;</span>
          <span class="btn-label">Export SVG<span class="btn-sub">Scalable vector</span></span>
        </button>
      </div>

      <div class="card-footer">QR code updates live as you type</div>
    </div>
  </main>

  <script>
    if (typeof QRCodeStyling === 'undefined') {
      document.querySelector('.card').innerHTML =
        '<p class="lib-error">Failed to load QR library.<br>Please check your internet connection and reload.</p>';
      throw new Error('QRCodeStyling not loaded');
    }

    const urlInput = document.getElementById('url-input');
    const errorMsg = document.getElementById('error-msg');

    function isValidUrl(str) {
      if (!str) return false;
      try {
        const url = new URL(str);
        return url.protocol === 'http:' || url.protocol === 'https:';
      } catch {
        return false;
      }
    }

    function setInputState(value) {
      const hasValue = value.length > 0;
      const valid = isValidUrl(value);
      urlInput.classList.toggle('error', hasValue && !valid);
      errorMsg.classList.toggle('visible', hasValue && !valid);
    }

    let debounceTimer;

    const qrPlaceholder = document.getElementById('qr-placeholder');
    const qrPreview = document.getElementById('qr-preview');

    const previewQR = new QRCodeStyling({
      width: 160,
      height: 160,
      type: 'svg',
      data: 'placeholder',
      margin: 4,
      dotsOptions: { color: '#000000', type: 'square' },
      backgroundOptions: { color: '#ffffff' },
      qrOptions: { errorCorrectionLevel: 'H' }
    });
    let previewAppended = false;

    const btnPng = document.getElementById('btn-png');
    const btnSvg = document.getElementById('btn-svg');

    const EXPORT_CONFIG = {
      dotsOptions: { color: '#000000', type: 'square' },
      backgroundOptions: { color: '#ffffff' },
      qrOptions: { errorCorrectionLevel: 'H' }
    };

    function exportPng() {
      const url = urlInput.value.trim();
      if (!isValidUrl(url)) return;
      try {
        new QRCodeStyling({
          width: 900, height: 900,
          type: 'canvas',
          data: url,
          margin: 28,
          ...EXPORT_CONFIG
        }).download({ name: 'qr-code', extension: 'png' });
      } catch (e) {
        alert('PNG export failed. Please try again.');
      }
    }

    function exportSvg() {
      const url = urlInput.value.trim();
      if (!isValidUrl(url)) return;
      try {
        new QRCodeStyling({
          width: 900, height: 900,
          type: 'svg',
          data: url,
          margin: 28,
          ...EXPORT_CONFIG
        }).download({ name: 'qr-code', extension: 'svg' });
      } catch (e) {
        alert('SVG export failed. Please try again.');
      }
    }

    btnPng.addEventListener('click', exportPng);
    btnSvg.addEventListener('click', exportSvg);

    function updatePreview(url) {
      const valid = isValidUrl(url);

      btnPng.disabled = !valid;
      btnSvg.disabled = !valid;

      if (valid) {
        if (!previewAppended) {
          previewQR.append(qrPreview);
          previewAppended = true;
        }
        try {
          previewQR.update({ data: url });
        } catch (e) {
          qrPlaceholder.style.display = '';
          qrPreview.style.display = 'none';
          return;
        }
        qrPlaceholder.style.display = 'none';
        qrPreview.style.display = 'block';
      } else {
        qrPlaceholder.style.display = '';
        qrPreview.style.display = 'none';
      }
    }

    urlInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        const val = urlInput.value.trim();
        setInputState(val);
        updatePreview(val);
      }, 300);
    });
  </script>
</body>
</html>
